<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ChopLift • PWA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22ChopLift%22,%22short_name%22:%22ChopLift%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%23111111%22,%22theme_color%22:%22%23111111%22,%22icons%22:[{%22src%22:%22https://abs.twimg.com/responsive-web/web/icon-default.png%22,%22sizes%22:%22192x192%22,%22type%22:%22image/png%22}]}">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    body { font-family: 'Press Start 2P', system-ui; }
    canvas { image-rendering: pixelated; }
    .control-btn { touch-action: none; }
  </style>
</head>
<body class="bg-black text-white overflow-hidden">

  <!-- Header -->
  <div class="flex justify-between items-center px-4 py-2 bg-zinc-900 border-b border-yellow-400">
    <div class="flex items-center gap-3">
      <div class="text-3xl">🚁</div>
      <div>
        <h1 class="text-xl font-bold tracking-widest text-yellow-400">CHOPLIFT</h1>
        <div class="text-[10px] text-yellow-300 -mt-1">1982 • APPLE II PWA EDITION</div>
      </div>
    </div>
    <div class="flex items-center gap-6 text-sm">
      <div>SCORE <span id="score" class="font-mono text-yellow-400">00000</span></div>
      <div>HOSTAGES <span id="rescued" class="font-mono text-yellow-400">0/12</span></div>
      <div>LIVES <span id="lives" class="font-mono text-yellow-400">3</span></div>
    </div>
    <button onclick="showSettings()" class="px-4 py-1 bg-yellow-400 text-black text-xs font-bold rounded">MENU</button>
  </div>

  <!-- Game Canvas -->
  <canvas id="game" class="mx-auto block bg-black" width="800" height="400"></canvas>

  <!-- On-screen controls -->
  <div class="fixed bottom-4 left-4 right-4 grid grid-cols-3 gap-2 md:hidden">
    <div onclick="controlLeft(true)" onpointerup="controlLeft(false)" onpointerleave="controlLeft(false)" class="control-btn bg-white/10 backdrop-blur-md rounded-2xl h-12 flex items-center justify-center text-2xl active:bg-white/30">←</div>
    <div class="col-span-1 flex flex-col gap-2">
      <div onclick="controlUp(true)" onpointerup="controlUp(false)" onpointerleave="controlUp(false)" class="control-btn bg-white/10 backdrop-blur-md rounded-2xl h-12 flex items-center justify-center text-2xl active:bg-white/30">↑</div>
      <div onclick="controlShoot()" class="control-btn bg-red-500/80 backdrop-blur-md rounded-2xl h-12 flex items-center justify-center text-xl active:scale-95 font-bold">SHOOT</div>
    </div>
    <div onclick="controlRight(true)" onpointerup="controlRight(false)" onpointerleave="controlRight(false)" class="control-btn bg-white/10 backdrop-blur-md rounded-2xl h-12 flex items-center justify-center text-2xl active:bg-white/30">→</div>
  </div>

  <!-- Settings / Pause Modal -->
  <div id="settingsModal" onclick="if(event.target.id==='settingsModal')hideSettings()" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50">
    <div onclick="event.stopImmediatePropagation()" class="bg-zinc-900 rounded-3xl max-w-md w-full mx-4 p-8 text-center">
      <h2 class="text-3xl font-bold text-yellow-400 mb-8">CHOPLIFT</h2>
      
      <div class="space-y-6">
        <!-- Sound Toggle -->
        <div class="flex items-center justify-between px-4 py-3 bg-zinc-800 rounded-2xl">
          <div class="flex items-center gap-3">
            <span class="text-xl">🔊</span>
            <span class="font-medium">Sound Effects</span>
          </div>
          <label class="relative inline-flex items-center cursor-pointer">
            <input type="checkbox" id="soundToggle" checked onchange="toggleSound()" class="sr-only peer">
            <div class="w-12 h-7 bg-zinc-700 rounded-full peer peer-checked:bg-emerald-500"></div>
            <div class="dot absolute left-1 top-1 bg-white w-5 h-5 rounded-full transition"></div>
          </label>
        </div>

        <div onclick="togglePause()" class="w-full py-4 bg-yellow-400 hover:bg-yellow-300 text-black font-bold text-xl rounded-3xl cursor-pointer">RESUME GAME</div>
        <div onclick="restartGame()" class="w-full py-4 bg-zinc-700 hover:bg-zinc-600 text-white font-bold text-xl rounded-3xl cursor-pointer">RESTART GAME</div>
      </div>

      <div class="mt-12 text-xs text-yellow-300/60">Classic Apple IIe beeps & buzzes<br>Added just for you 🚁</div>
    </div>
  </div>

  <!-- Start / Game Over Overlay -->
  <div id="overlay" onclick="if(event.target.id==='overlay')startGame()" class="fixed inset-0 bg-black/90 flex items-center justify-center z-50 hidden">
    <div class="text-center max-w-md px-8">
      <div id="overlayTitle" class="text-5xl font-bold text-yellow-400 mb-4">CHOPLIFT</div>
      <div id="overlaySubtitle" class="text-xl text-yellow-300 mb-8">1982 Apple II Classic</div>
      <div id="overlayMessage" class="text-2xl mb-12"></div>
      <div class="text-sm text-yellow-300/70 mb-8">← → Thrust  ↑ Hover  TAP = Shoot</div>
      <div class="bg-yellow-400 text-black font-bold text-lg px-10 py-4 rounded-3xl inline-block cursor-pointer active:scale-95">TAP TO START</div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('game')
    const ctx = canvas.getContext('2d')
    
    // Audio
    let audioContext
    let soundEnabled = true
    let rotorOscillator = null
    let rotorGain = null

    function initAudio() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)()
      }
    }

    function playBeep(freq, duration, type = 'square', volume = 0.3) {
      if (!soundEnabled || !audioContext) return
      const osc = audioContext.createOscillator()
      const gain = audioContext.createGain()
      osc.type = type
      osc.frequency.setValueAtTime(freq, audioContext.currentTime)
      gain.gain.value = volume
      osc.connect(gain).connect(audioContext.destination)
      osc.start()
      gain.gain.linearRampToValueAtTime(0, audioContext.currentTime + duration)
      osc.stop(audioContext.currentTime + duration + 0.1)
    }

    function playExplosion() {
      if (!soundEnabled || !audioContext) return
      const noise = audioContext.createBufferSource()
      const buffer = audioContext.createBuffer(1, audioContext.sampleRate * 0.6, audioContext.sampleRate)
      const output = buffer.getChannelData(0)
      for (let i = 0; i < buffer.length; i++) output[i] = Math.random() * 2 - 1
      noise.buffer = buffer
      const gain = audioContext.createGain()
      gain.gain.value = 0.6
      noise.connect(gain).connect(audioContext.destination)
      noise.start()
      gain.gain.linearRampToValueAtTime(0, audioContext.currentTime + 0.6)
    }

    function startRotorSound() {
      if (!soundEnabled || rotorOscillator || !audioContext) return
      rotorOscillator = audioContext.createOscillator()
      rotorGain = audioContext.createGain()
      rotorOscillator.type = 'square'
      rotorOscillator.frequency.setValueAtTime(120, audioContext.currentTime)
      rotorGain.gain.value = 0.12
      rotorOscillator.connect(rotorGain).connect(audioContext.destination)
      rotorOscillator.start()
    }

    function stopRotorSound() {
      if (rotorOscillator) {
        rotorOscillator.stop()
        rotorOscillator = null
      }
    }

    function playRescueSound() {
      if (!soundEnabled || !audioContext) return
      playBeep(800, 0.08, 'sine', 0.4)
      setTimeout(() => playBeep(1100, 0.12, 'sine', 0.4), 60)
      setTimeout(() => playBeep(1400, 0.25, 'sine', 0.4), 140)
    }

    // Game variables
    let helicopter = { x: 100, y: 200, vx: 0, vy: 0, rotor: 0, angle: 0 }
    let bullets = []
    let enemies = []
    let hostages = []
    let particles = []
    let score = 0
    let rescued = 0
    let lives = 3
    let gameOver = true
    let paused = false
    let keys = {}
    let touchLeft = false, touchRight = false, touchUp = false

    const GRAVITY = 0.25
    const THRUST = -0.6
    const GROUND_Y = 340

    function resetGame() {
      helicopter = { x: 100, y: 200, vx: 0, vy: 0, rotor: 0, angle: 0 }
      bullets = []
      enemies = []
      hostages = []
      particles = []
      score = 0
      rescued = 0
      lives = 3
      gameOver = false

      for (let i = 0; i < 6; i++) enemies.push({ x: 400 + i * 120, y: GROUND_Y - 20, alive: true })
      for (let i = 0; i < 12; i++) hostages.push({ x: 500 + i * 60, y: GROUND_Y - 30, rescued: false })
    }

    function drawBackground() {
      const grad = ctx.createLinearGradient(0, 0, 0, GROUND_Y)
      grad.addColorStop(0, '#1e3a8a')
      grad.addColorStop(1, '#3b82f6')
      ctx.fillStyle = grad
      ctx.fillRect(0, 0, canvas.width, GROUND_Y)
      ctx.fillStyle = '#166534'
      ctx.fillRect(0, GROUND_Y, canvas.width, canvas.height - GROUND_Y)
      ctx.fillStyle = '#14532d'
      ctx.beginPath()
      ctx.moveTo(0, GROUND_Y)
      ctx.lineTo(150, 180)
      ctx.lineTo(300, GROUND_Y)
      ctx.lineTo(450, 160)
      ctx.lineTo(600, GROUND_Y)
      ctx.lineTo(750, 190)
      ctx.lineTo(800, GROUND_Y)
      ctx.fill()
      ctx.fillStyle = '#854d0e'
      ctx.fillRect(40, GROUND_Y - 80, 80, 80)
      ctx.fillStyle = '#eab308'
      ctx.fillRect(60, GROUND_Y - 100, 40, 30)
    }

    function drawHelicopter() {
      ctx.save()
      ctx.translate(helicopter.x, helicopter.y)
      ctx.rotate(helicopter.angle * 0.02)
      ctx.fillStyle = '#64748b'
      ctx.fillRect(-25, -12, 50, 24)
      ctx.fillRect(-40, -5, 20, 8)
      ctx.fillStyle = '#1e2937'
      ctx.fillRect(-15, -18, 28, 14)
      ctx.strokeStyle = '#e2e8f0'
      ctx.lineWidth = 4
      ctx.beginPath()
      ctx.moveTo(-30, -20)
      ctx.lineTo(30, -20)
      ctx.stroke()
      ctx.save()
      ctx.rotate(helicopter.rotor)
      ctx.fillStyle = '#e2e8f0'
      ctx.fillRect(-28, -23, 56, 6)
      ctx.restore()
      ctx.fillStyle = '#1e2937'
      ctx.fillRect(-22, 12, 8, 6)
      ctx.fillRect(14, 12, 8, 6)
      ctx.restore()
    }

    function drawBullets() {
      ctx.fillStyle = '#f59e0b'
      bullets.forEach(b => ctx.fillRect(b.x, b.y, 12, 4))
    }

    function drawEnemies() {
      ctx.fillStyle = '#b91c1c'
      enemies.forEach(e => {
        if (!e.alive) return
        ctx.fillRect(e.x, e.y, 40, 20)
        ctx.fillStyle = '#1e2937'
        ctx.fillRect(e.x + 8, e.y - 8, 24, 8)
        ctx.fillStyle = '#b91c1c'
      })
    }

    function drawHostages() {
      ctx.fillStyle = '#eab308'
      hostages.forEach(h => {
        if (h.rescued) return
        ctx.fillRect(h.x, h.y, 12, 22)
      })
    }

    function drawParticles() {
      particles.forEach((p, i) => {
        ctx.globalAlpha = p.life
        ctx.fillStyle = p.color
        ctx.fillRect(p.x, p.y, 4, 4)
        ctx.globalAlpha = 1
        p.x += p.vx
        p.y += p.vy
        p.life -= 0.02
        if (p.life <= 0) particles.splice(i, 1)
      })
    }

    function update() {
      if (gameOver || paused) return

      helicopter.vy += GRAVITY
      if (touchUp || keys['ArrowUp'] || keys['w'] || keys['W']) helicopter.vy += THRUST
      if (touchLeft || keys['ArrowLeft'] || keys['a'] || keys['A']) helicopter.vx -= 0.4
      if (touchRight || keys['ArrowRight'] || keys['d'] || keys['D']) helicopter.vx += 0.4

      helicopter.x += helicopter.vx
      helicopter.y += helicopter.vy
      helicopter.vx *= 0.96
      helicopter.vy *= 0.96

      if (helicopter.x < 30) helicopter.x = 30
      if (helicopter.x > 750) helicopter.x = 750
      if (helicopter.y < 40) helicopter.y = 40
      if (helicopter.y > GROUND_Y - 30) {
        helicopter.y = GROUND_Y - 30
        if (helicopter.vy > 0) helicopter.vy = -2
      }

      helicopter.rotor += 0.4

      // Rotor sound
      if (Math.abs(helicopter.vy) > 0.5 || Math.abs(helicopter.vx) > 0.5) {
        startRotorSound()
      } else {
        stopRotorSound()
      }

      bullets.forEach((b, i) => {
        b.x += 12
        if (b.x > 820) bullets.splice(i, 1)
      })

      enemies.forEach(e => {
        if (e.alive && Math.random() < 0.008) {
          bullets.push({ x: e.x + 20, y: e.y + 5, friendly: false })
        }
      })

      bullets.forEach((b, bi) => {
        enemies.forEach((e, ei) => {
          if (e.alive && b.x > e.x && b.x < e.x + 40 && b.y > e.y - 10 && b.y < e.y + 20) {
            e.alive = false
            bullets.splice(bi, 1)
            score += 100
            playExplosion()
            for (let k = 0; k < 18; k++) {
              particles.push({ x: e.x + 20, y: e.y, vx: Math.random()*8-4, vy: Math.random()*-6-2, life: 1, color: '#f59e0b' })
            }
          }
        })
      })

      hostages.forEach(h => {
        if (!h.rescued && Math.abs(helicopter.x - h.x) < 40 && Math.abs(helicopter.y - h.y) < 50) {
          h.rescued = true
          rescued++
          score += 500
          playRescueSound()
        }
      })

      if (rescued >= 12 && helicopter.x < 150) {
        score += 2000
        gameOver = true
        document.getElementById('overlayTitle').textContent = 'MISSION COMPLETE!'
        document.getElementById('overlayMessage').innerHTML = `FINAL SCORE<br>${score}<br><span class="text-xl">You saved everyone!</span>`
        document.getElementById('overlay').classList.remove('hidden')
        stopRotorSound()
      }

      bullets.forEach((b, i) => {
        if (!b.friendly && Math.abs(b.x - helicopter.x) < 30 && Math.abs(b.y - helicopter.y) < 25) {
          bullets.splice(i, 1)
          lives--
          playExplosion()
          for (let k = 0; k < 25; k++) {
            particles.push({ x: helicopter.x, y: helicopter.y, vx: Math.random()*10-5, vy: Math.random()*10-5, life: 1, color: '#ef4444' })
          }
          if (lives <= 0) {
            gameOver = true
            document.getElementById('overlayTitle').textContent = 'GAME OVER'
            document.getElementById('overlayMessage').innerHTML = `FINAL SCORE<br>${score}`
            document.getElementById('overlay').classList.remove('hidden')
            stopRotorSound()
          }
        }
      })

      updateScoreUI()
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height)
      drawBackground()
      drawEnemies()
      drawHostages()
      drawHelicopter()
      drawBullets()
      drawParticles()
    }

    function gameLoop() {
      update()
      draw()
      requestAnimationFrame(gameLoop)
    }

    function updateScoreUI() {
      document.getElementById('score').textContent = String(score).padStart(5, '0')
      document.getElementById('rescued').textContent = `${rescued}/12`
      document.getElementById('lives').textContent = lives
    }

    function startGame() {
      document.getElementById('overlay').classList.add('hidden')
      resetGame()
      initAudio()
    }

    function togglePause() {
      paused = !paused
      if (paused) stopRotorSound()
      else if (!gameOver) startRotorSound()
    }

    function showSettings() {
      paused = true
      stopRotorSound()
      document.getElementById('settingsModal').classList.remove('hidden')
      document.getElementById('soundToggle').checked = soundEnabled
    }

    function hideSettings() {
      document.getElementById('settingsModal').classList.add('hidden')
      paused = false
      if (!gameOver) startRotorSound()
    }

    function toggleSound() {
      soundEnabled = document.getElementById('soundToggle').checked
      if (!soundEnabled) stopRotorSound()
    }

    function restartGame() {
      hideSettings()
      document.getElementById('overlay').classList.add('hidden')
      resetGame()
    }

    // Controls
    window.addEventListener('keydown', e => { keys[e.key] = true })
    window.addEventListener('keyup', e => { keys[e.key] = false })

    function controlLeft(down) { touchLeft = down }
    function controlRight(down) { touchRight = down }
    function controlUp(down) { touchUp = down }
    function controlShoot() {
      if (!gameOver && !paused) {
        bullets.push({ x: helicopter.x + 30, y: helicopter.y - 8, friendly: true })
        playBeep(1200, 0.04, 'square', 0.5)
      }
    }

    // PWA
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('data:application/javascript,' + encodeURIComponent(`self.addEventListener('install', () => self.skipWaiting());self.addEventListener('activate', () => self.clients.claim());`))
    }

    window.onload = () => {
      document.getElementById('overlay').classList.remove('hidden')
      document.getElementById('overlayMessage').innerHTML = `Classic helicopter rescue!<br>Shoot tanks • Rescue hostages • Return to base`
      gameLoop()
      console.log('%c🚁 ChopLift PWA with Apple IIe sounds ready! Tap MENU for sound toggle.', 'color:#eab308; font-weight:700')
    }
  </script>
</body>
</html>
