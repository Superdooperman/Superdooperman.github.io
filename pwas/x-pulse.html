<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>X Pulse • Latest News</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    body { font-family: 'Inter', system-ui, sans-serif; }
    .ticker-container { overflow: hidden; position: relative; padding: 12px 0; }
    .ticker { display: inline-flex; white-space: nowrap; animation: marquee 35s linear infinite; }
    .ticker:hover { animation-play-state: paused; }
    @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
    .ticker-item { display: inline-flex; align-items: center; padding: 0 24px; font-size: 15px; font-weight: 500; color: inherit; }
    .ticker-item:hover { color: #60a5fa; }
    #bgLayer { position: fixed; inset: 0; z-index: -1; overflow: hidden; pointer-events: none; transition: opacity 0.3s ease; }
    #bgLayer img, #bgLayer video { width: 100%; height: 100%; object-fit: cover; }
    #bgLayer video { filter: brightness(0.85); }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen pb-12 dark">

  <!-- BACKGROUND -->
  <div id="bgLayer"></div>

  <!-- HEADER -->
  <div class="sticky top-0 bg-zinc-950/90 backdrop-blur-md border-b border-zinc-800 z-50">
    <div class="max-w-screen-xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 bg-blue-500 rounded-2xl flex items-center justify-center text-2xl">𝕏</div>
        <h1 class="text-3xl font-bold tracking-tighter">X Pulse</h1>
      </div>
      <div class="flex items-center gap-5">
        <div onclick="refreshFeed()" class="flex items-center gap-2 text-blue-400 cursor-pointer active:scale-95">
          <span class="text-sm font-semibold">Refresh</span>
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.058 11H1M12 3v2m0 16v2m9-9H15" /></svg>
        </div>
        <button onclick="showSettings()" class="w-9 h-9 flex items-center justify-center rounded-2xl hover:bg-zinc-800 text-xl">⚙️</button>
        <button onclick="toggleTheme()" id="themeToggle" class="w-9 h-9 flex items-center justify-center rounded-2xl hover:bg-zinc-800 text-xl">🌙</button>
      </div>
    </div>
  </div>

  <div id="mainContent" class="max-w-screen-xl mx-auto px-4 pt-6 space-y-8 relative z-10"></div>

  <!-- SETTINGS MODAL -->
  <div id="settingsModal" onclick="if(event.target.id==='settingsModal')hideSettings()" class="hidden fixed inset-0 bg-black/70 flex items-end lg:items-center justify-center z-[9999]">
    <div onclick="event.stopImmediatePropagation()" class="bg-zinc-900 rounded-t-3xl lg:rounded-3xl w-full max-w-lg mx-0 lg:mx-4 overflow-hidden">
      <div class="p-6">
        <div class="flex justify-between items-center mb-6">
          <h2 class="text-2xl font-semibold">Settings</h2>
          <button onclick="hideSettings()" class="text-3xl leading-none">×</button>
        </div>

        <!-- Background Section -->
        <div class="mb-8 border border-zinc-700 rounded-3xl p-5">
          <h3 class="font-semibold mb-4 flex items-center gap-2">📸 Custom Background</h3>
          <button onclick="pickBackground()" class="w-full py-4 bg-blue-600 hover:bg-blue-500 rounded-3xl font-medium">Choose Image or Video from Gallery</button>
          
          <div id="bgPreview" class="hidden mt-4 flex items-center justify-between bg-zinc-800 rounded-2xl p-3">
            <div class="flex items-center gap-3">
              <div id="bgThumb" class="w-12 h-12 bg-zinc-700 rounded-xl overflow-hidden"></div>
              <div>
                <div id="bgName" class="text-sm font-medium"></div>
                <div id="bgType" class="text-xs text-zinc-400"></div>
              </div>
            </div>
            <button onclick="removeBackground()" class="text-red-400 text-sm font-medium">Remove</button>
          </div>

          <div class="mt-6">
            <div class="flex justify-between text-sm mb-2"><span>Background Opacity</span><span id="opacityValue" class="tabular-nums font-mono">35%</span></div>
            <input type="range" id="opacitySlider" min="0" max="100" value="35" class="w-full accent-blue-500" oninput="updateOpacity(this.value)">
          </div>

          <div id="videoControls" class="hidden grid grid-cols-2 gap-4 mt-6">
            <div>
              <label class="text-sm block mb-1">Mute Video</label>
              <label class="relative inline-flex items-center cursor-pointer">
                <input type="checkbox" id="muteToggle" checked onchange="toggleMute()" class="sr-only peer">
                <div class="w-11 h-6 bg-zinc-700 rounded-full peer peer-checked:bg-emerald-500"></div>
                <div class="dot absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition"></div>
              </label>
            </div>
            <div>
              <label class="text-sm block mb-1">Volume</label>
              <input type="range" id="volumeSlider" min="0" max="100" value="30" class="w-full accent-blue-500" oninput="updateVolume(this.value)">
            </div>
          </div>
        </div>

        <!-- Density -->
        <div class="mb-8">
          <label class="block text-sm font-medium mb-3">Posts per ticker</label>
          <div class="flex items-center gap-4">
            <input type="range" id="densitySlider" min="3" max="12" value="6" step="1" class="flex-1 accent-blue-500">
            <span id="densityValue" class="tabular-nums font-mono w-8 text-right">6</span>
          </div>
        </div>

        <!-- Categories -->
        <div id="categoryList" class="space-y-4"></div>
      </div>

      <div class="p-4 border-t border-zinc-800 flex justify-between text-sm">
        <button onclick="resetSettings()" class="px-6 py-3 text-zinc-400 hover:text-white">Reset all</button>
        <button onclick="hideSettings()" class="px-8 py-3 bg-blue-600 hover:bg-blue-500 rounded-2xl font-semibold">Done</button>
      </div>
    </div>
  </div>

  <!-- POST MODAL -->
  <div id="postModal" onclick="if(event.target.id==='postModal')hidePostModal()" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-[10000]">
    <div onclick="event.stopImmediatePropagation()" class="bg-white dark:bg-zinc-900 rounded-3xl max-w-md w-full mx-4 p-6 text-center">
      <div id="modalContent" class="py-6"></div>
      <button onclick="hidePostModal()" class="mt-4 px-10 py-3.5 bg-zinc-200 dark:bg-zinc-800 hover:bg-zinc-300 dark:hover:bg-zinc-700 rounded-3xl font-medium">Close</button>
    </div>
  </div>

  <script>
    // ==================== DATA ====================
    const allPosts = {
      0: { id: "2046262395048202458", handle: "legaleaze123", headline: "Kouri Richins wants new sentencing date — latest court update" },
      1: { id: "2046262395039838673", handle: "SPJournals", headline: "New study: Enhancing Alzheimer’s projections and policy in China" },
      2: { id: "2046262394750455997", handle: "runariasokuu", headline: "The only agenda: protecting criminals — latest political update" },
      3: { id: "2046262398420648245", handle: "dokudokupapa01", headline: "AI is being used for the weirdest things lately…" },
      4: { id: "2046262401234567890", handle: "BBCNews", headline: "EU passes landmark climate bill — what it means for the world" },
      5: { id: "2046262409876543210", handle: "WSJ", headline: "Middle East tensions rise after surprise diplomatic talks" },
      6: { id: "2046262412345678901", handle: "TechCrunch", headline: "OpenAI releases new multimodal model — here’s what changed" },
      7: { id: "2046262419876543212", handle: "elonmusk", headline: "xAI’s next breakthrough teased — live updates" },
      8: { id: "2046262423456789013", handle: "NBA", headline: "Lakers vs Warriors: playoff implications tonight" },
      9: { id: "2046262434567890124", handle: "CNBC", headline: "Stock market surges on strong earnings reports" }
    };

    let categories = [
      { id: "breaking", title: "Breaking on X", emoji: "🔴", enabled: true, posts: [0,1,2,3] },
      { id: "world", title: "World News", emoji: "🌍", enabled: true, posts: [4,5,1,2] },
      { id: "tech", title: "Tech & AI", emoji: "💻", enabled: true, posts: [3,6,7,9] },
      { id: "politics", title: "Politics", emoji: "🗳️", enabled: true, posts: [2,5,0,4] },
      { id: "sports", title: "Sports", emoji: "🏀", enabled: true, posts: [8,3,7,1] },
      { id: "business", title: "Business", emoji: "📈", enabled: false, posts: [9,6,4,5] }
    ];

    let density = 6;
    let currentBackground = null;
    let bgVideoElement = null;

    // ==================== BACKGROUND ====================
    async function pickBackground() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*,video/*';
      input.onchange = e => {
        const file = e.target.files[0];
        if (!file) return;
        if (file.size > 15*1024*1024) { alert("File too large (max ~15 MB for iOS performance)."); return; }

        const reader = new FileReader();
        reader.onload = ev => {
          currentBackground = {
            type: file.type.startsWith('video/') ? 'video' : 'image',
            dataUrl: ev.target.result,
            name: file.name || 'custom'
          };
          saveBackground();
          applyBackground();
          hideSettings();
          showSettings(); // refresh preview
        };
        reader.readAsDataURL(file);
      };
      input.click();
    }

    function removeBackground() {
      currentBackground = null;
      saveBackground();
      applyBackground();
      hideSettings();
      showSettings();
    }

    function applyBackground() {
      const layer = document.getElementById('bgLayer');
      layer.innerHTML = '';
      if (!currentBackground) { layer.style.opacity = '0'; return; }

      layer.style.opacity = (document.getElementById('opacitySlider')?.value || 35) / 100;

      if (currentBackground.type === 'image') {
        const img = document.createElement('img');
        img.src = currentBackground.dataUrl;
        layer.appendChild(img);
      } else {
        const video = document.createElement('video');
        video.src = currentBackground.dataUrl;
        video.loop = true;
        video.muted = true;
        video.autoplay = true;
        video.playsInline = true;
        video.style.objectFit = 'cover';
        layer.appendChild(video);
        bgVideoElement = video;
        video.play().catch(()=>{});
      }
    }

    function updateOpacity(val) {
      document.getElementById('opacityValue').textContent = val + '%';
      document.getElementById('bgLayer').style.opacity = val / 100;
    }

    function toggleMute() {
      if (bgVideoElement) bgVideoElement.muted = document.getElementById('muteToggle').checked;
    }

    function updateVolume(val) {
      if (bgVideoElement) bgVideoElement.volume = val / 100;
    }

    function saveBackground() {
      if (currentBackground) localStorage.setItem('xPulseBackground', JSON.stringify(currentBackground));
      else localStorage.removeItem('xPulseBackground');
    }

    function loadBackground() {
      const saved = localStorage.getItem('xPulseBackground');
      if (saved) {
        currentBackground = JSON.parse(saved);
        applyBackground();
      }
    }

    // ==================== FEED RENDERING ====================
    function renderFeed() {
      const container = document.getElementById('mainContent');
      container.innerHTML = '';

      const enabledCats = categories.filter(c => c.enabled);
      enabledCats.forEach(cat => {
        const catPosts = cat.posts.slice(0, density).map(i => allPosts[i]).filter(Boolean);
        if (catPosts.length === 0) return;

        let itemsHTML = '';
        catPosts.forEach((p, idx) => {
          const originalIndex = cat.posts[catPosts.indexOf(p)];
          itemsHTML += `<span onclick="openPost(${originalIndex})" class="ticker-item">${p.headline} • </span>`;
        });
        const fullTicker = itemsHTML + itemsHTML;

        const sectionHTML = `
          <div>
            <h2 class="text-xl font-semibold mb-3 flex items-center gap-2"><span>${cat.emoji}</span> ${cat.title}</h2>
            <div class="ticker-container border-b border-zinc-800 dark:border-zinc-700">
              <div class="ticker text-base">${fullTicker}</div>
            </div>
          </div>`;
        container.innerHTML += sectionHTML;
      });

      if (enabledCats.length === 0) {
        container.innerHTML = `<div class="text-center py-12 text-zinc-400">No categories enabled.<br>Tap ⚙️ to customize.</div>`;
      }
    }

    function openPost(index) {
      const post = allPosts[index];
      if (!post) return;
      const url = `https://x.com/${post.handle}/status/${post.id}`;
      const html = `<div class="text-center"><p class="text-2xl mb-6">${post.headline}</p><a href="${url}" target="_blank" class="inline-flex items-center gap-3 bg-blue-600 hover:bg-blue-500 px-8 py-4 rounded-3xl text-lg font-semibold">Open full post on 𝕏</a><p class="text-xs text-zinc-400 mt-8 break-all">${url}</p></div>`;
      document.getElementById('modalContent').innerHTML = html;
      document.getElementById('postModal').classList.remove('hidden');
    }

    function hidePostModal() { document.getElementById('postModal').classList.add('hidden'); }

    // ==================== SETTINGS ====================
    function showSettings() {
      const list = document.getElementById('categoryList');
      list.innerHTML = '';

      categories.forEach((cat, i) => {
        const div = document.createElement('div');
        div.className = "flex items-center justify-between py-3";
        div.innerHTML = `
          <div class="flex items-center gap-3">
            <span class="text-2xl">${cat.emoji}</span>
            <span class="font-medium">${cat.title}</span>
          </div>
          <label class="relative inline-flex items-center cursor-pointer">
            <input type="checkbox" ${cat.enabled ? 'checked' : ''} onchange="toggleCategory(${i})" class="sr-only peer">
            <div class="w-11 h-6 bg-zinc-700 rounded-full peer peer-checked:bg-blue-500"></div>
            <div class="dot absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition"></div>
          </label>`;
        list.appendChild(div);
      });

      // Density
      const slider = document.getElementById('densitySlider');
      const valueEl = document.getElementById('densityValue');
      slider.value = density;
      valueEl.textContent = density;
      slider.oninput = () => valueEl.textContent = slider.value;

      // Background preview
      const preview = document.getElementById('bgPreview');
      if (currentBackground) {
        preview.classList.remove('hidden');
        document.getElementById('bgName').textContent = currentBackground.name;
        document.getElementById('bgType').textContent = currentBackground.type;
        document.getElementById('bgThumb').innerHTML = currentBackground.type === 'image' 
          ? `<img src="${currentBackground.dataUrl}" class="w-full h-full object-cover">` 
          : `<div class="w-full h-full bg-black flex items-center justify-center text-2xl">▶️</div>`;
      } else {
        preview.classList.add('hidden');
      }

      document.getElementById('settingsModal').classList.remove('hidden');
    }

    function hideSettings() {
      density = parseInt(document.getElementById('densitySlider').value);
      document.getElementById('settingsModal').classList.add('hidden');
      saveSettings();
      renderFeed();
    }

    function toggleCategory(i) { categories[i].enabled = !categories[i].enabled; }

    function resetSettings() {
      categories = [ /* default categories – same as above */ ];
      density = 6;
      hideSettings();
    }

    // ==================== THEME & PERSISTENCE ====================
    function toggleTheme() {
      const html = document.documentElement;
      const isDark = html.classList.contains('dark');
      if (isDark) {
        html.classList.remove('dark');
        document.getElementById('themeToggle').innerHTML = '☀️';
        localStorage.setItem('theme', 'light');
      } else {
        html.classList.add('dark');
        document.getElementById('themeToggle').innerHTML = '🌙';
        localStorage.setItem('theme', 'dark');
      }
    }

    function loadTheme() {
      const saved = localStorage.getItem('theme');
      const html = document.documentElement;
      const toggle = document.getElementById('themeToggle');
      if (saved === 'light') {
        html.classList.remove('dark');
        toggle.innerHTML = '☀️';
      } else {
        html.classList.add('dark');
        toggle.innerHTML = '🌙';
      }
    }

    function saveSettings() {
      localStorage.setItem('xPulseCategories', JSON.stringify(categories));
      localStorage.setItem('xPulseDensity', density);
    }

    function loadSettings() {
      const savedCats = localStorage.getItem('xPulseCategories');
      if (savedCats) categories = JSON.parse(savedCats);
      const savedDensity = localStorage.getItem('xPulseDensity');
      if (savedDensity) density = parseInt(savedDensity);
    }

    function refreshFeed() {
      const icon = event.currentTarget.querySelector('svg');
      if (icon) icon.style.transform = 'rotate(360deg)';
      setTimeout(() => { if (icon) icon.style.transform = ''; renderFeed(); }, 700);
    }

    // ==================== INIT ====================
    window.onload = () => {
      loadSettings();
      loadTheme();
      loadBackground();
      renderFeed();
      console.log('%c🚀 X Pulse fully loaded with custom background!', 'color:#1da1f2;font-weight:600');
    };

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('data:application/javascript,' + encodeURIComponent(`self.addEventListener('install',()=>self.skipWaiting());self.addEventListener('activate',()=>self.clients.claim());`));
    }
  </script>
</body>
</html>
